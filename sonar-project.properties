# Configuración de SonarQube para monorepo-bca
sonar.projectKey=monorepo-bca
sonar.projectName=Monorepo BCA
sonar.projectVersion=1.0

# URL del servidor SonarQube
sonar.host.url=http://10.3.0.244:9900

# Directorios de código fuente
sonar.sources=apps,packages

# Exclusiones (node_modules, builds, etc.)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.spec.ts,**/coverage/**,**/.next/**,**/prisma/migrations/**

# Configuración de TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
