# Configuración de SonarQube para monorepo-bca
# Actualizado: 22 Diciembre 2025
sonar.projectKey=monorepo-bca
sonar.projectName=Monorepo BCA
sonar.projectVersion=2.0

# URL del servidor SonarQube
sonar.host.url=http://10.3.0.244:9900

# Directorios de código fuente (solo src de cada app)
sonar.sources=apps/backend/src,apps/documentos/src,apps/frontend/src,apps/remitos/src,packages/types/src,packages/utils/src

# Exclusiones (node_modules, builds, scripts de desarrollo, etc.)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/prisma/migrations/**,**/import-data/**,**/__mocks__/**,**/*.d.ts,**/jest.setup.cjs,**/test-*.js,**/recover-*.js,**/scripts/*.py

# Tests (separados del código fuente)
sonar.tests=apps/documentos/__tests__,apps/backend/src/services/__tests__,apps/backend/src/middlewares/__tests__,apps/remitos/__tests__,packages/utils/src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Cobertura de código (lcov de cada app y package)
sonar.javascript.lcov.reportPaths=coverage/lcov.info,apps/backend/coverage/lcov.info,apps/documentos/coverage/lcov.info,apps/frontend/coverage/lcov.info,apps/remitos/coverage/lcov.info,packages/utils/coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info,apps/backend/coverage/lcov.info,apps/documentos/coverage/lcov.info,apps/frontend/coverage/lcov.info,apps/remitos/coverage/lcov.info,packages/utils/coverage/lcov.info

# TypeScript configs
sonar.typescript.tsconfigPaths=apps/backend/tsconfig.json,apps/documentos/tsconfig.json,apps/frontend/tsconfig.json,apps/remitos/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
