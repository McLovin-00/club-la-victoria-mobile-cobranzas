# Configuración SonarQube para Monorepo BCA
sonar.projectKey=monorepo-bca
sonar.projectName=Monorepo BCA
sonar.sources=.

# Exclusiones de análisis
# - Dependencias y builds
# - Tests (analizados por separado)
# - Tipos TypeScript generados
# - Prisma schemas (generados)
# - Scripts de migración/utilidad (no son código de producción)
# - Configs PM2 (duplicados intencionalmente para diferentes entornos)
sonar.exclusions=\
  **/node_modules/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/*.d.ts,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/prisma/**,\
  **/__tests__/**,\
  import-data/**,\
  ecosystem.*.js

# Deshabilitar SCM (usamos GitHub Actions para CI)
sonar.scm.disabled=true
