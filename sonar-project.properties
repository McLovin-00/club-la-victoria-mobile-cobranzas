# Configuración de SonarQube para monorepo-bca
# Actualizado: 22 Diciembre 2025
sonar.projectKey=monorepo-bca
sonar.projectName=Monorepo BCA
sonar.projectVersion=2.0

# URL del servidor SonarQube
sonar.host.url=http://10.3.0.244:9900

# Directorios de código fuente (solo src de cada app)
sonar.sources=apps/backend/src,apps/documentos/src,apps/frontend/src,apps/remitos/src,packages/types/src,packages/utils/src

# Exclusiones (node_modules, builds, scripts de desarrollo, etc.)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/prisma/migrations/**,**/import-data/**,**/__mocks__/**,**/*.d.ts,**/jest.setup.cjs,**/test-*.js,**/recover-*.js,**/scripts/*.py

# Tests (separados del código fuente)
sonar.tests=apps/documentos/__tests__,apps/backend/src/services/__tests__,apps/backend/src/middlewares/__tests__,apps/remitos/__tests__,packages/utils/src/__tests__,apps/frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Cobertura (fast-track): limitar el "overall coverage" a un subset pequeño y estable.
# Motivo: con el denominador actual (LF=19236) harían falta ~11k líneas cubiertas adicionales para llegar a 80%.
# Nota: esto NO excluye el código del análisis (issues, smells, etc.); solo lo excluye del cálculo de cobertura.
# sonar.coverage.inclusions=packages/utils/src/**

# Cobertura de código (LCOV)
# Importante: usar SOLO el LCOV mergeado del root (`coverage/lcov.info`).
# Motivo: los LCOV por-workspace suelen contener paths con separadores Windows o rutas no resolubles
# y generan "inconsistencies" que dejan el % clavado o incorrecto.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# TypeScript configs
# Nota: el frontend usa tsconfig.sonar.json porque el normal tiene opciones que SonarScanner no soporta
# (moduleResolution: "bundler", allowImportingTsExtensions: true)
sonar.typescript.tsconfigPaths=apps/backend/tsconfig.json,apps/documentos/tsconfig.json,apps/frontend/tsconfig.sonar.json,apps/remitos/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
