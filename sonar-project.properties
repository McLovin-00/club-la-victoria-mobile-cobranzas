# ================================================
# SONARQUBE CONFIGURATION - Monorepo BCA
# ================================================
# Descripción: Configuración de análisis de calidad de código con SonarQube
# Versión: 1.0
# Fecha: 8 Octubre 2025
# Alineado con: Manual Operativo Microsyst
# ================================================

# ================================
# PROYECTO
# ================================
sonar.projectKey=monorepo-bca
sonar.projectName=Monorepo BCA
sonar.projectVersion=1.0

# ================================
# ANÁLISIS DE CÓDIGO FUENTE
# ================================

# Directorios de código fuente (todos los servicios)
sonar.sources=apps/backend/src,apps/frontend/src,apps/documentos/src

# Exclusiones globales
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/tests/**,\
  **/e2e/**,\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/public/**,\
  **/assets/**,\
  **/*.d.ts,\
  **/vite.config.ts,\
  **/vitest.config.ts,\
  **/jest.config.js,\
  **/eslint.config.js,\
  **/prettier.config.js,\
  **/tailwind.config.js,\
  **/postcss.config.js

# ================================
# TESTS
# ================================

# Directorios de tests
sonar.tests=apps/backend/src,apps/frontend/src,apps/documentos/src

# Inclusiones de tests
sonar.test.inclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/tests/**,\
  **/e2e/**,\
  **/__tests__/**

# ================================
# COBERTURA DE CÓDIGO
# ================================

# Reportes de cobertura (LCOV)
sonar.javascript.lcov.reportPaths=\
  apps/backend/coverage/lcov.info,\
  apps/frontend/coverage/lcov.info,\
  apps/documentos/coverage/lcov.info

# Cobertura para TypeScript
sonar.typescript.lcov.reportPaths=\
  apps/backend/coverage/lcov.info,\
  apps/frontend/coverage/lcov.info,\
  apps/documentos/coverage/lcov.info

# ================================
# CONFIGURACIÓN JAVASCRIPT/TYPESCRIPT
# ================================

# Versión de ECMAScript
sonar.javascript.ecmaVersion=2022

# Archivos TypeScript config
sonar.typescript.tsconfigPath=\
  apps/backend/tsconfig.json,\
  apps/frontend/tsconfig.json,\
  apps/documentos/tsconfig.json

# ================================
# QUALITY GATES
# ================================

# Configuración de umbrales (se configuran en SonarQube UI)
# Recomendaciones:
# - Coverage (New Code): >= 70%
# - Duplications (New Code): <= 3%
# - Maintainability Rating (New Code): A
# - Reliability Rating (New Code): A
# - Security Rating (New Code): A
# - Security Hotspots Reviewed: 100%

# ================================
# CONFIGURACIÓN POR LENGUAJE
# ================================

# JavaScript/TypeScript
sonar.javascript.node.maxspace=4096

# ================================
# ANÁLISIS DE SEGURIDAD
# ================================

# Detectar secretos hardcodeados
sonar.javascript.detectSecrets=true

# ================================
# CONFIGURACIÓN AVANZADA
# ================================

# Encoding
sonar.sourceEncoding=UTF-8

# SCM (Source Control Management)
sonar.scm.provider=git
sonar.scm.disabled=false

# Links externos
sonar.links.homepage=https://github.com/microsyst/monorepo-bca
sonar.links.ci=https://github.com/microsyst/monorepo-bca/actions
sonar.links.issue=https://github.com/microsyst/monorepo-bca/issues

# ================================
# CONFIGURACIÓN MONOREPO (OPCIONAL)
# ================================

# Para análisis por servicio individual, usar:
# sonar-scanner -Dsonar.projectBaseDir=apps/backend -Dsonar.projectKey=monorepo-bca-backend
# sonar-scanner -Dsonar.projectBaseDir=apps/frontend -Dsonar.projectKey=monorepo-bca-frontend
# sonar-scanner -Dsonar.projectBaseDir=apps/documentos -Dsonar.projectKey=monorepo-bca-documentos

# ================================
# NOTAS DE USO
# ================================

# Ejecución local (requiere SonarQube corriendo):
# npm run sonar
#
# O manualmente:
# sonar-scanner \
#   -Dsonar.host.url=http://localhost:9000 \
#   -Dsonar.login=YOUR_TOKEN
#
# En CI/CD (GitHub Actions):
# El token se pasa automáticamente vía secrets.SONAR_TOKEN
#
# Para generar el token:
# 1. Acceder a SonarQube: http://localhost:9000
# 2. My Account > Security > Generate Token
# 3. Guardar en GitHub Secrets como SONAR_TOKEN

