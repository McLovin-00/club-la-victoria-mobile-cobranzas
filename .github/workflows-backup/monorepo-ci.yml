name: monorepo-ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better SonarQube analysis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (workspace)
        run: npm run lint

      - name: Typecheck (workspace)
        run: |
          if npm run -s typecheck; then echo ok; else echo "typecheck missing, skipping"; fi

      - name: Test with Coverage (workspace)
        run: npm test --workspaces --if-present -- --coverage
        continue-on-error: true

      - name: Build (workspace)
        run: npm run build --workspaces --if-present

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true  # No fallar el build si SonarQube falla (opcional)

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true  # No fallar el build si Quality Gate falla (opcional)
        # Nota: Cambiar a 'false' para hacer mandatory el Quality Gate


