name: frontend-ci

on:
  push:
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'apps/frontend/**'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Lint frontend
        working-directory: apps/frontend
        run: npm run lint
      - name: Typecheck frontend
        working-directory: apps/frontend
        run: npm run type-check
      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build
      - name: Test frontend
        working-directory: apps/frontend
        run: npm run test:coverage


