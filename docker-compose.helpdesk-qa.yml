# ==============================================================================
# Setup QA Mesa de Ayuda: infra + backend + frontend + helpdesk + nginx
# ==============================================================================
# Levanta todo lo necesario para testear /helpdesk en el navegador.
#
# Uso (desde la raíz del monorepo):
#   docker compose -f docker-compose.helpdesk-qa.yml up -d --build
#   # Luego ejecutar migraciones (ver docs/helpdesk/SETUP_QA_PLATAFORMA.md)
#   # Abrir http://localhost:8080/helpdesk
#
# Prerrequisitos: .env con DATABASE_URL apuntando a postgres:5432, carpeta keys/
# con jwt_private.pem y jwt_public.pem, y apps/helpdesk/.env.docker.local
# ==============================================================================

networks:
  qa:
    driver: bridge

volumes:
  pg_data_qa:
  redis_data_qa:
  minio_data_qa:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-monorepo-bca}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_qa:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data_qa:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_qa:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - qa

  backend:
    build:
      context: .
      dockerfile: deploy/stack-ip-192.168.15.136/Dockerfile.backend
    image: bca-backend-qa
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4800
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-monorepo-bca}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_ADMIN_DATABASE: postgres
      DB_SCHEMA: platform
      DB_CONNECTION_TIMEOUT: "10000"
      DB_COMMAND_TIMEOUT: "30000"
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-monorepo-bca}?schema=platform
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      REDIS_URL: redis://redis:6379
      FRONTEND_URLS: http://localhost,http://localhost:8550
      LOG_LEVEL: info
      RATE_LIMIT_MULTIPLIER: "1000"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # node:20-alpine no incluye wget; usamos Node para el probe HTTP
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4800/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      start_period: 45s
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - qa

  documentos:
    image: nginx:alpine
    restart: unless-stopped
    command:
      [
        "/bin/sh",
        "-c",
        "printf 'server { listen 4802; location /health { return 200 \"{\\\"status\\\":\\\"ok\\\",\\\"service\\\":\\\"documentos-stub\\\"}\"; add_header Content-Type application/json; } location / { return 404; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:4802/health",
        ]
      start_period: 5s
      interval: 15s
      timeout: 10s
      retries: 4
    networks:
      - qa

  helpdesk:
    build:
      context: ./apps/helpdesk
      dockerfile: Dockerfile
    image: bca-helpdesk-qa
    restart: unless-stopped
    env_file:
      - ./apps/helpdesk/.env.docker.local
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-monorepo-bca}?schema=platform
      HELPDESK_DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-monorepo-bca}?schema=helpdesk
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4803/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      start_period: 30s
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - qa

  frontend:
    build:
      context: .
      dockerfile: deploy/stack-ip-192.168.15.136/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8080
        VITE_API_BASE_URL: http://localhost:8080
        VITE_DOCUMENTOS_API_URL: http://localhost:8080
        VITE_DOCUMENTOS_WS_URL: ws://localhost:8080/socket.io/
    image: bca-frontend-qa
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      documentos:
        condition: service_healthy
    networks:
      - qa

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      helpdesk:
        condition: service_healthy
      documentos:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - qa
