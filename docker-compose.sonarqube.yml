version: "3.9"

# ================================================
# SONARQUBE - Análisis de Calidad de Código
# ================================================
# Propósito: Stack local de SonarQube para análisis de código
# Uso: docker compose -f docker-compose.sonarqube.yml up -d
# Acceso: http://localhost:9000 (admin / admin)
# Fecha: 8 Octubre 2025
# ================================================

networks:
  sonarqube-network:
    driver: bridge

services:
  # ================================
  # SONARQUBE SERVER
  # ================================
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    restart: unless-stopped
    
    ports:
      - "9000:9000"  # SonarQube Web UI
    
    environment:
      # Conexión a PostgreSQL
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar123}
      
      # Configuración de servidor
      SONAR_WEB_JAVAADDITIONALOPTS: -server
      
      # Elasticsearch (motor de búsqueda interno)
      SONAR_SEARCH_JAVAADDITIONALOPTS: -Xmx512m -Xms512m
      
      # Configuración de seguridad
      SONAR_FORCEAUTHENTICATION: true
      
    networks:
      - sonarqube-network
    
    depends_on:
      sonarqube-db:
        condition: service_healthy
    
    volumes:
      # Datos persistentes
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_bundled_plugins:/opt/sonarqube/lib/bundled-plugins
    
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # POSTGRESQL DATABASE
  # ================================
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar123}
      POSTGRES_DB: sonar
      
      # Configuración de performance
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    
    networks:
      - sonarqube-network
    
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ================================
# VOLUMES
# ================================
volumes:
  sonarqube_data:
    name: sonarqube_data
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_extensions:
    name: sonarqube_extensions
  sonarqube_bundled_plugins:
    name: sonarqube_bundled_plugins
  sonarqube_postgres_data:
    name: sonarqube_postgres_data

# ================================================
# INSTRUCCIONES DE USO
# ================================================

# INICIAR SONARQUBE:
#   docker compose -f docker-compose.sonarqube.yml up -d

# ACCEDER A SONARQUBE:
#   URL: http://localhost:9000
#   Usuario: admin
#   Contraseña: admin (cambiar en primer acceso)

# CONFIGURACIÓN INICIAL:
#   1. Acceder a http://localhost:9000
#   2. Login: admin / admin
#   3. Cambiar contraseña cuando se solicite
#   4. Ir a: My Account > Security > Generate Tokens
#   5. Crear token con nombre "GitHub Actions"
#   6. Guardar token en GitHub Secrets como SONAR_TOKEN
#   7. Crear proyecto:
#      - Administration > Projects > Create Project
#      - Project key: monorepo-bca
#      - Display name: Monorepo BCA
#      - Main branch: main
#   8. Configurar Quality Gate (opcional):
#      - Quality Gates > Create
#      - Configurar umbrales según necesidades

# QUALITY GATE RECOMENDADO (NEW CODE):
#   - Coverage: >= 70%
#   - Duplications: <= 3%
#   - Maintainability Rating: A
#   - Reliability Rating: A
#   - Security Rating: A
#   - Security Hotspots Reviewed: 100%

# EJECUTAR ANÁLISIS LOCAL:
#   # Opción 1: Via npm script (si está configurado)
#   npm run sonar
#
#   # Opción 2: Via sonar-scanner directamente
#   sonar-scanner \
#     -Dsonar.host.url=http://localhost:9000 \
#     -Dsonar.login=YOUR_TOKEN_HERE

# VER LOGS:
#   docker compose -f docker-compose.sonarqube.yml logs -f sonarqube

# DETENER SONARQUBE:
#   docker compose -f docker-compose.sonarqube.yml down

# ELIMINAR TODO (incluyendo datos):
#   docker compose -f docker-compose.sonarqube.yml down -v

# ACTUALIZAR SONARQUBE:
#   docker compose -f docker-compose.sonarqube.yml pull
#   docker compose -f docker-compose.sonarqube.yml up -d

# BACKUP DE DATOS:
#   docker exec sonarqube-postgres pg_dump -U sonar sonar > sonarqube_backup.sql

# RESTORE DE DATOS:
#   cat sonarqube_backup.sql | docker exec -i sonarqube-postgres psql -U sonar sonar

# ================================================
# TROUBLESHOOTING
# ================================================

# Si SonarQube no inicia:
#   1. Verificar logs: docker compose -f docker-compose.sonarqube.yml logs sonarqube
#   2. Verificar que PostgreSQL está healthy: docker ps
#   3. Aumentar vm.max_map_count (Linux):
#      sudo sysctl -w vm.max_map_count=262144
#      echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf

# Si falla el análisis:
#   1. Verificar que el token es correcto
#   2. Verificar que el proyecto existe en SonarQube
#   3. Verificar que sonar-project.properties está configurado correctamente
#   4. Revisar logs de sonar-scanner

# ================================================
# INTEGRACIÓN CON CI/CD
# ================================================

# En GitHub Actions, agregar secrets:
#   SONAR_HOST_URL: http://your-sonarqube-server:9000
#   SONAR_TOKEN: [token generado en SonarQube]

# El workflow monorepo-ci.yml ya incluye la integración

# ================================================
# PLUGINS RECOMENDADOS (OPCIONAL)
# ================================================

# Se pueden instalar plugins adicionales desde:
# Administration > Marketplace
#
# Recomendados:
#   - SonarJS (ya incluido)
#   - SonarTS (ya incluido)
#   - SonarQube Community Branch Plugin (para branches)

# ================================================
# SEGURIDAD
# ================================================

# IMPORTANTE:
# - Cambiar contraseña de admin en primer acceso
# - Cambiar SONAR_DB_PASSWORD en producción
# - No exponer puerto 9000 públicamente sin reverse proxy
# - Usar HTTPS en producción (vía Nginx)
# - Rotar tokens regularmente
# - Revisar permisos de usuarios

# ================================================

