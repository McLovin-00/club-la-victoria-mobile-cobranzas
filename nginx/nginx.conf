events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss 
               application/json application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    # DNS embebido de Docker: sin resolver + variables en proxy_pass, nginx resuelve
    # backend/frontend/helpdesk una sola vez al arrancar; tras recrear contenedores las
    # IPs cambian y aparece 502 (connect() refused al puerto equivocado).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ================================
    # FRONTEND (EXTERNAL ACCESS)
    # ================================
    server {
        listen 80;
        server_name bca.microsyst.com.ar;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;
        
        # Frontend static files
        location / {
            set $docker_frontend frontend;
            proxy_pass http://host.docker.internal:8551;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # API Backend (EXTERNAL ACCESS)
        location = /api/docs/notifications/unread-count {
            default_type application/json;
            return 200 '{"data":{"count":0}}';
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            set $docker_backend backend;
            proxy_pass http://$docker_backend:4800;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }
        
        # Helpdesk API (EXTERNAL ACCESS)
        location /api/helpdesk/ {
            limit_req zone=api burst=15 nodelay;
            
            set $docker_helpdesk helpdesk;
            proxy_pass http://host.docker.internal:4803;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }
        
        # Helpdesk WebSocket (Socket.IO)
        location /helpdesk-socket/ {
            set $docker_helpdesk_ws helpdesk;
            proxy_pass http://host.docker.internal:4803;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ================================
    # DOCUMENTOS MICROSERVICE (EXTERNAL ACCESS)
    # ================================
    server {
        listen 80;
        server_name doc.microsyst.com.ar;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;
        
        # Documentos API
        location /api/ {
            limit_req zone=api burst=15 nodelay;
            
            set $docker_documentos documentos;
            proxy_pass http://$docker_documentos:4802;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }
        
        # WebSocket for documentos
        location /socket.io/ {
            set $docker_documentos_ws documentos;
            proxy_pass http://$docker_documentos_ws:4802;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # Health checks
        location /health {
            set $docker_documentos_h documentos;
            proxy_pass http://$docker_documentos_h:4802;
            access_log off;
        }
    }

    # ================================
    # MINIO STORAGE (EXTERNAL ACCESS)
    # ================================
    server {
        listen 80;
        server_name buck.microsyst.com.ar;
        
        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        
        # MinIO API and buckets
        location / {
            limit_req zone=upload burst=10 nodelay;
            
            set $docker_minio minio;
            proxy_pass http://$docker_minio:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # MinIO specific headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            
            # Increase timeouts for large uploads
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;
            
            # Buffer settings for large files
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # Eliminado bloque de servidor Calidad

    # ================================
    # INTERNAL SERVICES BLOCK
    # (No external access - only Docker network)
    # ================================
    # Los siguientes servicios NO deben ser accesibles desde fuera:
    # - postgres:5432 (solo red interna)
    # - redis:6379 (solo red interna)  
    # - minio:9000 (solo a través de buck.microsyst.com.ar)
    # - adminer:8080 (solo desarrollo local)
    # - mailhog:8025 (solo desarrollo local)
    # - metabase:3030 (solo desarrollo local)
}
