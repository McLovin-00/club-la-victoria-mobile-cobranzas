worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Upstream para backend
    upstream backend {
        server backend:4800;
        keepalive 32;
    }

    # Upstream para documentos
    upstream documentos {
        server documentos:4802;
        keepalive 32;
    }

    server {
        listen 8550;
        server_name _;

        # Archivos estáticos del frontend
        root /usr/share/nginx/html;
        index index.html;

        # Detectar protocolo real - si viene de dominio público, asumir HTTPS
        set $real_scheme $scheme;
        if ($host ~* "microsyst\.com\.ar$") {
            set $real_scheme "https";
        }
        # También verificar si el MikroTik/proxy envió X-Forwarded-Proto
        set $forwarded_proto $real_scheme;
        if ($http_x_forwarded_proto) {
            set $forwarded_proto $http_x_forwarded_proto;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"frontend-nginx"}';
            add_header Content-Type application/json;
        }

        # ============================================
        # PROXY AL BACKEND (puerto 4800)
        # ============================================
        
        # API Platform
        location /api/platform/ {
            proxy_pass http://backend/api/platform/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API Config (backend)
        location /api/config/ {
            proxy_pass http://backend/api/config/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";
        }

        # Health del backend
        location /api/health {
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ============================================
        # PROXY A DOCUMENTOS (puerto 4802)
        # ============================================

        # API Docs
        location /api/docs/ {
            proxy_pass http://documentos/api/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            client_max_body_size 100M;
        }

        # WebSocket para documentos
        location /socket.io/ {
            proxy_pass http://documentos/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health de documentos
        location /api/docs-health {
            proxy_pass http://documentos/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ============================================
        # FRONTEND - Archivos estáticos (SPA)
        # ============================================

        # Archivos estáticos con cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Favicon y otros estáticos
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # SPA fallback - todas las rutas no encontradas van a index.html
        location / {
            try_files $uri $uri/ /index.html;
            
            # Headers de seguridad
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

