groups:
  - name: infrastructure
    rules:
      - alert: VMUnreachable
        expr: up == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} no responde"

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 85% en {{ $labels.instance }}"

      - alert: HighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RAM > 90% en {{ $labels.instance }}"

      - alert: DiskSpaceWarning
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disco > 80% en {{ $labels.instance }}"

      - alert: DiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 90
        labels:
          severity: critical
        annotations:
          summary: "Disco > 90% en {{ $labels.instance }}"

  - name: postgres
    rules:
      - alert: PGReplicationLagWarning
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Replication lag > 30s"

      - alert: PGReplicationLagCritical
        expr: pg_replication_lag > 120
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Replication lag > 120s"

      - alert: PGConnectionsHigh
        expr: pg_stat_activity_count > 160
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 160/200"

  - name: application
    rules:
      - alert: HealthCheckFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Health check fallido en {{ $labels.service }}"
