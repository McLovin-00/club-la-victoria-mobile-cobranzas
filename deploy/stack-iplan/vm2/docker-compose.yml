networks:
  default:
    name: bca_data_network
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

services:
  postgres:
    image: postgres:16
    container_name: bca_postgres
    restart: unless-stopped
    ports:
      - "${VM2_IP:-10.8.10.121}:5432:5432"
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: monorepo-bca
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      DB_FLOWISE_PASSWORD: ${DB_FLOWISE_PASSWORD}
      DB_READONLY_PASSWORD: ${DB_READONLY_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c listen_addresses=*
        -c shared_buffers=8GB
        -c effective_cache_size=24GB
        -c work_mem=256MB
        -c maintenance_work_mem=1GB
        -c max_connections=200
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c wal_buffers=64MB
        -c checkpoint_completion_target=0.9
        -c max_wal_size=2GB
        -c min_wal_size=512MB
        -c wal_level=replica
        -c max_wal_senders=3
        -c wal_keep_size=1GB
        -c hot_standby=on
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_lock_waits=on
        -c autovacuum_max_workers=3
        -c autovacuum_naptime=30s
        -c track_activities=on
        -c track_counts=on
        -c huge_pages=try
        -c jit=on
        -c default_statistics_target=100
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: "2.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d monorepo-bca"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '2g'

  redis:
    image: redis:7-alpine
    container_name: bca_redis
    restart: unless-stopped
    ports:
      - "${VM2_IP:-10.8.10.121}:6379:6379"
    command: >
      redis-server
        --maxmemory 4gb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --tcp-keepalive 60
        --timeout 300
        --save 900 1
        --save 300 10
        --save 60 10000
        --requirepass ${REDIS_PASSWORD}
        --maxclients 5000
        --tcp-backlog 511
        --hz 10
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: bca_minio
    restart: unless-stopped
    ports:
      - "${VM2_IP:-10.8.10.121}:9000:9000"
      - "${VM2_IP:-10.8.10.121}:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_REQUESTS_MAX: 1000
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
