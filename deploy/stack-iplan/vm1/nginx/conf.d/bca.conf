map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Usar IP real del cliente (viene de NPM via X-Real-IP)
map $http_x_real_ip $rate_limit_key {
    default       $http_x_real_ip;
    ''            $binary_remote_addr;
}

limit_req_zone $rate_limit_key zone=general:10m rate=120r/m;
limit_req_zone $rate_limit_key zone=login:10m rate=10r/m;
limit_req_zone $rate_limit_key zone=api:10m rate=300r/m;
limit_req_zone $rate_limit_key zone=upload:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 50m;

    set_real_ip_from 10.8.10.49;
    real_ip_header X-Real-IP;

    # Security headers (NPM termina SSL, estos headers refuerzan)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # =========================================================================
    # Block source maps
    # =========================================================================
    location ~* \.map$ {
        return 404;
    }

    # =========================================================================
    # Health checks
    # =========================================================================
    location = /health {
        access_log off;
        return 200 '{"status":"ok","server":"nginx-iplan"}';
        add_header Content-Type application/json;
    }

    location = /api/health {
        proxy_pass http://backend:4800/health;
        proxy_set_header Host $host;
    }

    location = /api/docs-health {
        proxy_pass http://documentos:4802/health;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # Documentos API (antes del catch-all /api/)
    # =========================================================================
    location /api/docs/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://documentos:4802;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # =========================================================================
    # Remitos API (antes del catch-all /api/)
    # =========================================================================
    location /api/remitos/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://remitos:4803;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # =========================================================================
    # WebSocket (Socket.IO - Documentos)
    # =========================================================================
    location /socket.io/ {
        proxy_pass http://documentos:4802;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # MinIO proxy (presigned URLs via VM2)
    # =========================================================================
    location /storage/ {
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://10.8.10.121:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # =========================================================================
    # MinIO presigned URLs (buckets directos, sin rate limit agresivo)
    # =========================================================================
    location ~ ^/documentos-empresa- {
        proxy_pass http://10.8.10.121:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }


    # =========================================================================
    # Backend API (catch-all para /api/)
    # =========================================================================
    location /api/ {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://backend:4800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # Static assets cache
    # =========================================================================
    location /assets/ {
        proxy_pass http://frontend:8550;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # =========================================================================
    # Frontend SPA (fallback)
    # =========================================================================
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://frontend:8550;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
