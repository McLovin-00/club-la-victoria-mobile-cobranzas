version: "3.9"

networks:
  frontend:
    driver: overlay
    external: false
  backend:
    driver: overlay
    external: false

services:
  # ================================
  # NGINX REVERSE PROXY (EXTERNAL GATEWAY)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
      - backend
    depends_on:
      - frontend
      - backend
      - documentos
      - minio
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # FRONTEND (INTERNAL NETWORK ONLY)
  # ================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL}
      VITE_DOCUMENTOS_API_URL: ${VITE_DOCUMENTOS_API_URL}
      VITE_DOCUMENTOS_WS_URL: ${VITE_DOCUMENTOS_WS_URL}
    networks:
      - frontend
    # NO PORTS EXPOSED - Only through nginx
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8550/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # BACKEND (INTERNAL NETWORK ONLY)
  # ================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      NODE_ENV: production
      PORT: 4800
      DATABASE_URL: ${DATABASE_URL}
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      REDIS_URL: redis://redis:6379
      ENABLE_DOCUMENTOS: "true"
      ENABLE_GATEWAY: "false"
      ENABLE_CHAT: "false"
      ENABLE_CALIDAD: "false"
      LOG_LEVEL: info
      FRONTEND_URLS: ${FRONTEND_URLS}
    networks:
      - frontend
      - backend
    # NO PORTS EXPOSED - Only through nginx
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4800/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # DOCUMENTOS MICROSERVICE (INTERNAL NETWORK ONLY)
  # ================================
  documentos:
    build:
      context: ./apps/documentos
      dockerfile: Dockerfile
    container_name: documentos
    environment:
      NODE_ENV: production
      ENABLE_DOCUMENTOS: "true"
      DOCUMENTOS_PORT: 4802
      DOCUMENTOS_DATABASE_URL: ${DOCUMENTOS_DATABASE_URL}
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      # CRITICAL: Internal MinIO access
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_PREFIX: documentos-empresa
      # External public URLs for signed URLs
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
      # Internal access for Flowise and file processing
      MINIO_INTERNAL_BASE_URL: http://minio:9000
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      FRONTEND_URLS: ${FRONTEND_URLS}
    networks:
      - frontend
      - backend
    # NO PORTS EXPOSED - Only through nginx
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4802/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # MINIO STORAGE (INTERNAL NETWORK ONLY)
  # ================================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      # Important: Set server URL for proper signed URLs
      MINIO_SERVER_URL: ${MINIO_PUBLIC_BASE_URL}
    networks:
      - backend
    # NO PORTS EXPOSED - Only through nginx
    volumes:
      - minio_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # DATABASE (INTERNAL NETWORK ONLY)
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - backend
    # NO PORTS EXPOSED - Internal only
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================
  # REDIS CACHE (INTERNAL NETWORK ONLY)
  # ================================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    # NO PORTS EXPOSED - Internal only
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ================================
  # FLOWISE AI (OPTIONAL - INTERNAL NETWORK ONLY)
  # ================================
  # Servicio de IA para clasificación automática de documentos.
  # Descomentar este bloque para habilitar Flowise en Producción.
  # Requiere ~6GB RAM adicionales.
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    environment:
      PORT: 3005
      # Base de datos (usa el PostgreSQL del stack)
      OVERRIDE_DATABASE: "true"
      DATABASE_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: ${DB_NAME}
      DATABASE_SCHEMA: flowise
      # Node.js optimizations para producción
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Autenticación UI (OBLIGATORIO en producción)
      FLOWISE_USERNAME: ${FLOWISE_USERNAME}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD}
      # Seguridad
      FLOWISE_SECRETKEY_OVERWRITE: ${FLOWISE_SECRET_KEY}
      # Límites de carga
      FLOWISE_MAX_REQUEST_SIZE: "50mb"
      FLOWISE_MAX_UPLOAD_SIZE: "50mb"
      # CORS (solo dominios de producción)
      CORS_ORIGINS: "${FRONTEND_URLS}"
      # Logging
      LOG_LEVEL: warn
      # Langchain (opcional)
      LANGCHAIN_TRACING_V2: "false"
    networks:
      - backend  # Solo red interna
    # NO PORTS EXPOSED - Solo acceso interno desde microservicio documentos
    # Si necesitas acceso externo, exponerlo a través de Nginx con autenticación
    volumes:
      - flowise_data:/root/.flowise
      - /tmp/flowise-uploads:/root/.flowise/uploads
    depends_on:
      - postgres
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 4G  # Producción: VM de 32GB RAM, límite conservador inicial
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # Descomentar para habilitar (comentado por defecto para ahorrar recursos)
    profiles:
      - ai

volumes:
  pg_data:
  redis_data:
  minio_data:
  nginx_logs:
  flowise_data:
